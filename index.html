<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950 text-slate-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
    <script src="app.js" defer></script>
</head>

<body class="flex h-full overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col justify-between hidden md:flex">
        <div class="p-6">
            <div class="flex items-center space-x-2 text-emerald-400 font-bold tracking-wider text-sm mb-8">
                <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <span> </span>
            </div>
            <nav class="space-y-2">
                <button onclick="switchTab('hub')"
                    class="nav-btn w-full text-left px-4 py-2 rounded bg-slate-800 text-emerald-400 font-medium">01.
                    Nodo principal</button>
                <button onclick="switchTab('subprojects')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">02.
                    Componentes</button>
                <button onclick="switchTab('pdf')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">03.
                    Documentación</button>
                <button onclick="switchTab('media')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">04.
                    Planos y Bocetos</button>
                <button onclick="switchTab('brainstorm')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">05.
                    Ideas / Implementaciones</button>
                <button onclick="switchTab('code')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">06.
                    Códigos de prueba</button>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
            Repositorio Público del Portafolio.
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto bg-slate-950">
        <header
            class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50 backdrop-blur">
            <h1 id="vault-title" class="text-lg font-bold tracking-tight text-slate-200">Sincronizando Bóveda...</h1>
            <div class="text-xs px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400">STATUS:
                INVESTIGACIÓN</div>
        </header>

        <div id="content-area" class="p-8 max-w-6xl w-full mx-auto space-y-8">
            <div class="text-sm text-slate-500 animate-pulse">Iniciando lectura de registros locales...</div>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4"
        onclick="this.classList.add('hidden')">
        <img id="lightbox-img" src="" class="max-w-full max-h-full rounded shadow-2xl border border-slate-700">
    </div>

</body>

</html>
