<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950 text-slate-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault // Gestor de Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="flex h-full overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col justify-between hidden md:flex">
        <div class="p-6">
            <div class="flex items-center space-x-2 text-emerald-400 font-bold tracking-wider text-sm mb-8">
                <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <span>VAULT // CORE</span>
            </div>
            <nav class="space-y-2">
                <button onclick="switchTab('hub')"
                    class="nav-btn w-full text-left px-4 py-2 rounded bg-slate-800 text-emerald-400 font-medium">01.
                    Main Hub</button>
                <button onclick="switchTab('subprojects')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">02.
                    Componentes</button>
                <button onclick="switchTab('pdf')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">03.
                    Documentación</button>
                <button onclick="switchTab('media')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">04.
                    Planos y Medios</button>
                <button onclick="switchTab('brainstorm')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">05.
                    Ideas / Backlog</button>
                <button onclick="switchTab('code')"
                    class="nav-btn w-full text-left px-4 py-2 rounded hover:bg-slate-800 hover:text-slate-200 transition">06.
                    Code Snippets</button>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
            Repositorio Público de Portafolio
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto bg-slate-950">
        <header
            class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50 backdrop-blur">
            <h1 id="vault-title" class="text-lg font-bold tracking-tight text-slate-200">Cargando proyecto...</h1>
            <div class="text-xs px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400">STATUS:
                INVESTIGACIÓN</div>
        </header>

        <div id="content-area" class="p-8 max-w-6xl w-full mx-auto space-y-8">
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4"
        onclick="this.classList.add('hidden')">
        <img id="lightbox-img" src="" class="max-w-full max-h-full rounded shadow-2xl border border-slate-700">
    </div>

    <script>
        // Simulamos la carga del archivo JSON local (puedes reemplazarlo por un fetch real)
        const vaultData = {
            "project_meta": {
                "name": "Proyecto ROBOT-HEX",
                "description": "Ecosistema robótico modular. Orientado al estudio cinemático, automatización de tareas físicas y desarrollo de firmware embebido en arquitecturas distribuidas.",
                "global_progress": 45
            },
            "subprojects": [
                {
                    "id": "sub-1",
                    "name": "Actuador Brazo (3 Ejes)",
                    "status": "Diseño CAD",
                    "status_color": "bg-cyan-500",
                    "progress": 70,
                    "timeline": ["Estudio de torques estáticos", "Modelado de engranajes en CAD", "Simulación cinemática"],
                    "description": "Extremidad superior modular para manipulación de carga ligera. Estudiando reducción planetaria."
                },
                {
                    "id": "sub-2",
                    "name": "Módulo de Potencia e Inalámbrico",
                    "status": "Prototipo Físico",
                    "status_color": "bg-amber-500",
                    "progress": 30,
                    "timeline": ["Esquemático del regulador", "Pruebas de comunicación serial"],
                    "description": "PCB encargada de la distribución limpia de voltaje para los servomotores y aislamiento galvánico."
                }
            ],
            "pdf_vault": [
                { "title": "Datasheet - MCU Principal de Control", "lang": "Inglés", "category": "Datasheet", "file": "#" },
                { "title": "Kompaktes Robotik-Handbuch", "lang": "Alemán", "category": "Manual", "file": "#" },
                { "title": "Cálculo de Fuerzas en Estructuras de Aluminio", "lang": "Español", "category": "Paper", "file": "#" }
            ],
            "media_center": [
                { "title": "Boceto estructural de la base (Papel)", "type": "Mano alzada", "url": "https://images.unsplash.com/photo-1581092335397-9583fe92d232?auto=format&fit=crop&w=600&q=80" },
                { "title": "Plano CAD - Ensamble Final", "type": "Computadora", "url": "https://images.unsplash.com/photo-1537462715879-360eeb61a0bc?auto=format&fit=crop&w=600&q=80" }
            ],
            "brainstorming": {
                "scratchpad": [
                    "Evaluar si el bus de datos I2C causará ruido con los motores de inducción.",
                    "Agregar soporte para control mediante un script de telemetría en Python."
                ],
                "backlog": [
                    { "idea": "Integración de un giroscopio/IMU de 6 ejes", "priority": "Alta" },
                    { "idea": "Chasis secundario impreso en filamento de fibra de carbono", "priority": "Baja" }
                ]
            },
            "code_snippets": [
                {
                    "title": "Controlador PWM Inicial (Frecuencia de Servos)",
                    "lang": "cpp",
                    "code": "#include <Wire.h>\n\nvoid setup() {\n  Serial.begin(115200);\n  // Inicializar registros del temporizador para PWM limpio\n}\n\nvoid loop() {\n  // Mapear señales del transmisor\n}"
                }
            ]
        };

        // Renderizador de pestañas
        function render_hub() {
            return `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
                    <h2 class="text-xl font-bold mb-3 text-emerald-400">// VISTA GLOBAL</h2>
                    <p class="text-slate-400 text-sm leading-relaxed">${vaultData.project_meta.description}</p>
                    <div class="mt-6">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-slate-500">Progreso Total de la Fase de Estudio</span>
                            <span class="text-emerald-400 font-bold">${vaultData.project_meta.global_progress}%</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full" style="width: ${vaultData.project_meta.global_progress}%"></div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
                        <h3 class="text-sm font-bold text-slate-400 mb-4">> Árbol de Dependencias de Arquitectura</h3>
                        <ul class="text-xs space-y-2 text-slate-300">
                            <li class="text-emerald-400">■ KRONOS (Main)</li>
                            <li class="pl-4">├── ├─ Actuador Brazo 3 DOF (Mecánica/Control)</li>
                            <li class="pl-4">└── └─ Módulo de Potencia (Electrónica hardware)</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function render_subprojects() {
            return `
                <h2 class="text-xl font-bold text-emerald-400">// COMPONENTES INDEPENDIENTES</h2>
                <div class="grid grid-cols-1 gap-6">
                    ${vaultData.subprojects.map(sub => `
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg space-y-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-lg font-bold">${sub.name}</h3>
                                    <span class="inline-block text-[10px] uppercase font-bold px-2 py-0.5 rounded text-slate-950 ${sub.status_color} mt-1">${sub.status}</span>
                                </div>
                                <span class="text-sm text-slate-400">${sub.progress}% Completado</span>
                            </div>
                            <p class="text-sm text-slate-400">${sub.description}</p>
                            <div class="border-t border-slate-800 pt-4">
                                <h4 class="text-xs font-bold text-slate-500 mb-2">Hitos Completados / Planificados:</h4>
                                <ul class="text-xs space-y-1 text-slate-300">
                                    ${sub.timeline.map(step => `<li>✓ ${step}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function render_pdf() {
            return `
                <h2 class="text-xl font-bold text-emerald-400">// BÓVEDA DE DOCUMENTACIÓN (MULTILINGÜE)</h2>
                <div class="overflow-x-auto bg-slate-900 border border-slate-800 rounded-lg">
                    <table class="w-full text-left text-sm text-slate-300">
                        <thead class="text-xs uppercase bg-slate-800 text-slate-400 border-b border-slate-700">
                            <tr>
                                <th class="p-4">Documento Técnico</th>
                                <th class="p-4">Idioma</th>
                                <th class="p-4">Categoría</th>
                                <th class="p-4">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${vaultData.pdf_vault.map(pdf => `
                                <border-b border-slate-800 hover:bg-slate-800/30>
                                    <td class="p-4 font-medium">${pdf.title}</td>
                                    <td class="p-4"><span class="px-2 py-0.5 bg-slate-800 border border-slate-700 rounded text-xs text-slate-400">${pdf.lang}</span></td>
                                    <td class="p-4 text-slate-400">${pdf.category}</td>
                                    <td class="p-4"><a href="${pdf.file}" class="text-emerald-400 hover:underline">Descargar/Ver</a></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function render_media() {
            return `
                <h2 class="text-xl font-bold text-emerald-400">// PLANOS TÉCNICOS Y MEDIOS</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    ${vaultData.media_center.map(media => `
                        <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden group cursor-pointer" onclick="openLightbox('${media.url}')">
                            <div class="h-48 overflow-hidden bg-slate-950">
                                <img src="${media.url}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300 opacity-80 group-hover:opacity-100">
                            </div>
                            <div class="p-4 flex justify-between items-center bg-slate-900">
                                <span class="text-sm font-medium">${media.title}</span>
                                <span class="text-[10px] uppercase tracking-wider bg-slate-800 border border-slate-700 text-slate-400 px-2 py-0.5 rounded">${media.type}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function render_brainstorm() {
            return `
                <h2 class="text-xl font-bold text-emerald-400">// BITÁCORA DE IDEAS Y BACKLOG</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
                        <h3 class="text-sm font-bold text-slate-400 mb-4">> Ideas Pasajeras (Scratchpad)</h3>
                        <ul class="space-y-3 text-sm text-slate-300">
                            ${vaultData.brainstorming.scratchpad.map(note => `<li class="p-3 bg-slate-950 border border-slate-800 rounded-md border-l-2 border-l-amber-500">${note}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
                        <h3 class="text-sm font-bold text-slate-400 mb-4">> Futuras Implementaciones</h3>
                        <ul class="space-y-2 text-xs">
                            ${vaultData.brainstorming.backlog.map(item => `
                                <li class="flex justify-between p-2 bg-slate-950 border border-slate-800 rounded">
                                    <span>${item.idea}</span>
                                    <span class="text-rose-400 font-bold">${item.priority}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function render_code() {
            return `
                <h2 class="text-xl font-bold text-emerald-400">// CODE SNIPPETS (FIRMWARE / AUTOMATIZACIÓN)</h2>
                <div class="space-y-6">
                    ${vaultData.code_snippets.map(block => `
                        <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
                            <div class="bg-slate-800 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                                <span class="text-xs font-bold text-slate-300">${block.title}</span>
                                <span class="text-[10px] uppercase bg-slate-950 text-emerald-400 font-bold px-2 py-0.5 rounded">${block.lang}</span>
                            </div>
                            <pre class="p-4 text-xs text-emerald-300 overflow-x-auto bg-slate-950 font-mono"><code>${block.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Router simple de cambio de pestañas
        function switchTab(tabId) {
            const container = document.getElementById('content-area');

            // Actualizar botones del sidebar
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-emerald-400');
                btn.classList.add('hover:bg-slate-800', 'hover:text-slate-200');
            });
            event.currentTarget.classList.add('bg-slate-800', 'text-emerald-400');

            // Renderizar contenido basado en pestaña elegida
            switch (tabId) {
                case 'hub': container.innerHTML = render_hub(); break;
                case 'subprojects': container.innerHTML = render_subprojects(); break;
                case 'pdf': container.innerHTML = render_pdf(); break;
                case 'media': container.innerHTML = render_media(); break;
                case 'brainstorm': container.innerHTML = render_brainstorm(); break;
                case 'code': container.innerHTML = render_code(); break;
            }
        }

        // Lightbox interactivo para planos
        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lb.classList.remove('hidden');
        }

        // Inicializar títulos y vista por defecto
        document.getElementById('vault-title').innerText = vaultData.project_meta.name;
        document.getElementById('content-area').innerHTML = render_hub();
    </script>
</body>

</html>
